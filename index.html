// === State ===
let deepQuestions = [];
let selectedQuestionCount = 0;
let activeChapters = [];
let currentQuestionItem = null;
let isAnswering = false;
let questionIndex = 0;
let totalCorrect = 0;
let totalWrong = 0;

// === Load questions ===
function loadQuestionsFromChapters(chapterIds, maxCount) {
    deepQuestions = [];
    activeChapters = chapterIds;
    for (const ch of QUESTION_CHAPTERS) {
        if (!chapterIds.includes(ch.id)) continue;
        const count = ch.count || 0;
        for (let i = 1; i <= count; i++) {
            const num = String(i).padStart(2, '0');
            const qPath = ch.id + '/q' + num + '.jpg';
            const ans = ch.answers ? ch.answers[i - 1] : null;
            deepQuestions.push({
                q: qPath,
                img: true,
                a: ans ? ans.a : '?',
                chapter: ch.name
            });
        }
    }
    // Shuffle
    for (let i = deepQuestions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deepQuestions[i], deepQuestions[j]] = [deepQuestions[j], deepQuestions[i]];
    }
    if (maxCount > 0 && deepQuestions.length > maxCount) {
        deepQuestions.length = maxCount;
    }
}

// === Chapter selection UI ===
function renderChapterList() {
    const container = document.getElementById('chapter-list');
    if (!QUESTION_CHAPTERS.length) {
        container.innerHTML = '<div class="no-chapters-msg">暂无题库章节。</div>';
        document.getElementById('question-count-info').textContent = '';
        return;
    }
    container.innerHTML = QUESTION_CHAPTERS.map(ch => {
        return `<div class="chapter-item" data-id="${ch.id}">
            <input type="checkbox" id="ch-${ch.id}" value="${ch.id}">
            <span class="ch-name">${ch.name}</span>
            <span class="ch-count">${ch.count || 0} 题</span>
        </div>`;
    }).join('');
    container.querySelectorAll('.chapter-item').forEach(item => {
        item.addEventListener('click', (e) => {
            if (e.target.tagName === 'INPUT') return;
            const cb = item.querySelector('input[type=checkbox]');
            cb.checked = !cb.checked;
            item.classList.toggle('selected', cb.checked);
            updateChapterCountInfo();
        });
        item.querySelector('input[type=checkbox]').addEventListener('change', (e) => {
            item.classList.toggle('selected', e.target.checked);
            updateChapterCountInfo();
        });
    });
    document.getElementById('sel-all-chapters').onclick = () => {
        container.querySelectorAll('input[type=checkbox]').forEach(cb => { cb.checked = true; });
        container.querySelectorAll('.chapter-item').forEach(el => el.classList.add('selected'));
        updateChapterCountInfo();
    };
    document.getElementById('sel-none-chapters').onclick = () => {
        container.querySelectorAll('input[type=checkbox]').forEach(cb => { cb.checked = false; });
        container.querySelectorAll('.chapter-item').forEach(el => el.classList.remove('selected'));
        updateChapterCountInfo();
    };
    updateChapterCountInfo();
}

function updateChapterCountInfo() {
    const checked = document.querySelectorAll('#chapter-list input[type=checkbox]:checked');
    let total = 0;
    checked.forEach(cb => {
        const ch = QUESTION_CHAPTERS.find(c => c.id === cb.value);
        if (ch) total += (ch.count || 0);
    });
    const info = document.getElementById('question-count-info');
    const countInput = document.getElementById('q-count-input');
    if (total === 0) {
        info.textContent = '请至少选择一个章节';
    } else {
        info.textContent = `已选 ${total} 道题，留空则使用全部`;
    }
    countInput.max = total || 999;
}

function openChapterModal() {
    renderChapterList();
    document.getElementById('chapter-modal').style.display = 'flex';
    document.getElementById('chapter-modal').setAttribute('aria-hidden', 'false');
    document.getElementById('chapter-modal-warning').textContent = '';
}

function closeChapterModal() {
    document.getElementById('chapter-modal').style.display = 'none';
    document.getElementById('chapter-modal').setAttribute('aria-hidden', 'true');
}

function confirmChapterSelection() {
    const w = document.getElementById('chapter-modal-warning');
    const checked = document.querySelectorAll('#chapter-list input[type=checkbox]:checked');
    if (checked.length === 0) {
        w.textContent = '请至少选择一个章节！';
        return;
    }
    const chapterIds = Array.from(checked).map(cb => cb.value);
    const maxCount = parseInt(document.getElementById('q-count-input').value) || 0;
    if (maxCount < 0) {
        w.textContent = '题量不能为负数';
        return;
    }
    let total = 0;
    chapterIds.forEach(id => {
        const ch = QUESTION_CHAPTERS.find(c => c.id === id);
        if (ch) total += (ch.count || 0);
    });
    if (maxCount > total) {
        w.textContent = `题量（${maxCount}）超过已选总题数（${total}）`;
        return;
    }
    selectedQuestionCount = maxCount;
    loadQuestionsFromChapters(chapterIds, maxCount);
    w.textContent = '';
    closeChapterModal();
    startQuiz();
}

function startQuiz() {
    questionIndex = 0;
    totalCorrect = 0;
    totalWrong = 0;
    document.getElementById('progress-bar').style.display = 'block';
    document.getElementById('score-display').style.display = 'flex';
    hideFinishOverlay();
    updateScoreDisplay();
    showNextQuestion();
}

function showNextQuestion() {
    if (questionIndex >= deepQuestions.length) {
        showFinishOverlay();
        return;
    }
    isAnswering = true;
    currentQuestionItem = deepQuestions[questionIndex];
    renderCurrentQuestion();
    updateScoreDisplay();
}

function renderCurrentQuestion() {
    const item = currentQuestionItem;
    if (!item) return;
    document.getElementById('question-counter').textContent = `第 ${questionIndex + 1} / ${deepQuestions.length} 题`;
    document.getElementById('q-text').innerHTML = `<b>Q${questionIndex + 1}：</b>`;

    const qImg = document.getElementById('q-image');
    const hint = document.getElementById('zoom-hint');
    if (item.img) {
        qImg.src = 'questions/' + item.q.replace('\n', '');
        qImg.style.display = 'block';
        if (hint) hint.style.display = 'block';
    } else {
        qImg.style.display = 'none';
        if (hint) hint.style.display = 'none';
    }

    const opt = document.getElementById('options');
    opt.innerHTML = '';
    const row = document.createElement('div');
    row.className = 'options-row';
    ['A', 'B', 'C', 'D'].forEach(letter => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = letter;
        btn.onclick = () => handleAnswer(letter, btn);
        opt.appendChild(btn);
    });
}

function handleAnswer(letter, clickedBtn) {
    if (!isAnswering) return;
    isAnswering = false;

    const qItem = currentQuestionItem;
    const correct = testAllAnswersCorrect ? true : (letter === qItem.a);

    // Disable all buttons and highlight
    const allBtns = document.querySelectorAll('.option-btn');
    allBtns.forEach(b => {
        b.disabled = true;
        if (b.textContent === qItem.a) b.classList.add('correct-answer');
    });

    if (correct) {
        totalCorrect++;
        showMsg('✅ 正确！', 'correct');
    } else {
        totalWrong++;
        clickedBtn.classList.add('wrong-answer');
        showMsg(`❌ 错误！正确答案是: ${qItem.a}`, 'incorrect');
        addWrongQuestionRecord(qItem, questionIndex + 1);
    }

    updateScoreDisplay();

    // Auto-advance after delay
    setTimeout(() => {
        hideMsg();
        questionIndex++;
        showNextQuestion();
    }, 1500);
}

function updateScoreDisplay() {
    const total = totalCorrect + totalWrong;
    const remaining = deepQuestions.length - questionIndex;
    document.getElementById('correct-count').textContent = totalCorrect;
    document.getElementById('wrong-count').textContent = totalWrong;
    document.getElementById('remaining-count').textContent = remaining;
    const pct = deepQuestions.length > 0 ? Math.round((total / deepQuestions.length) * 100) : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
}

function showMsg(t, c) {
    const m = document.getElementById('msg');
    m.textContent = t; m.className = 'status-msg ' + c; m.style.display = 'block';
}

function hideMsg() {
    document.getElementById('msg').style.display = 'none';
}

// === Finish overlay ===
function showFinishOverlay() {
    const total = totalCorrect + totalWrong;
    const acc = total > 0 ? Math.round((totalCorrect / total) * 100) + '%' : '—';
    document.getElementById('finish-total').textContent = total;
    document.getElementById('finish-correct').textContent = totalCorrect;
    document.getElementById('finish-wrong').textContent = totalWrong;
    document.getElementById('finish-acc').textContent = acc;
    document.getElementById('finish-overlay').style.display = 'flex';
    document.getElementById('finish-overlay').setAttribute('aria-hidden', 'false');
}

function hideFinishOverlay() {
    document.getElementById('finish-overlay').style.display = 'none';
    document.getElementById('finish-overlay').setAttribute('aria-hidden', 'true');
}

document.getElementById('finish-restart-btn').onclick = () => {
    hideFinishOverlay();
    openChapterModal();
};

// === Zoom image ===
function zoomImage(src) {
    const overlay = document.createElement('div');
    overlay.className = 'image-overlay';
    overlay.onclick = () => overlay.remove();
    const img = document.createElement('img');
    img.src = src;
    overlay.appendChild(img);
    document.body.appendChild(overlay);
}

// === Wrong book ===
const WRONG_BOOK_KEY = 'ig-quiz-wrong-book';
const WRONG_BOOK_SESSION_KEY = 'ig-quiz-wrong-book-session';

if (!sessionStorage.getItem(WRONG_BOOK_SESSION_KEY)) {
    try { localStorage.removeItem(WRONG_BOOK_KEY); } catch (e) {}
    sessionStorage.setItem(WRONG_BOOK_SESSION_KEY, '1');
}

function getWrongBook() {
    try { return JSON.parse(localStorage.getItem(WRONG_BOOK_KEY) || '[]'); } catch { return []; }
}

function saveWrongBook(records) {
    try { localStorage.setItem(WRONG_BOOK_KEY, JSON.stringify(records)); } catch (e) {}
}

function addWrongQuestionRecord(qItem, qNumber) {
    if (!qItem) return;
    const records = getWrongBook();
    records.push({
        question: qItem.q,
        img: !!qItem.img,
        questionIndex: qNumber,
        answer: qItem.a,
        timestamp: Date.now()
    });
    saveWrongBook(records);
}

function escapeHtml(str) {
    return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
}

function renderWrongBook() {
    const container = document.getElementById('wrong-book-list');
    const records = getWrongBook();
    if (!records.length) {
        container.innerHTML = '<p>暂无错题。</p>';
        return;
    }
    container.innerHTML = '<div class="wrong-book-section"><div class="wrong-book-section-title">全部错题<span class="wrong-book-count">共 ' + records.length + ' 题</span></div><div class="wrong-book-section-items">' +
        records.map((item, i) => `
      <div class="wrong-book-item">
        <div class="wrong-book-meta"><strong>#${i + 1}</strong></div>
        <div class="wrong-book-question"><strong>Q${item.questionIndex || '?'}:</strong> ${item.img ? '<img src="questions/' + escapeHtml(item.question) + '" style="max-width:200px;border-radius:4px;cursor:zoom-in;" onclick="zoomImage(this.src)">' : escapeHtml(item.question)}</div>
        <div class="wrong-book-answer"><strong>正确答案:</strong> ${escapeHtml(item.answer)}</div>
      </div>
    `).join('') + '</div></div>';
}

function openWrongBook() {
    renderWrongBook();
    const o = document.getElementById('wrong-book-overlay');
    o.style.display = 'flex'; o.setAttribute('aria-hidden', 'false');
}
function closeWrongBook() {
    const o = document.getElementById('wrong-book-overlay');
    o.style.display = 'none'; o.setAttribute('aria-hidden', 'true');
}
function clearAllWrongBook() {
    if (!window.confirm('确定要清空错题本中的全部记录吗？\n此操作无法撤销。')) return;
    saveWrongBook([]); renderWrongBook();
}

// === Admin ===
let testAllAnswersCorrect = (function () {
    try { return localStorage.getItem('allAnswersCorrectMode') === 'true'; } catch (e) { return false; }
})();

function openAdminPanel() {
    document.getElementById('admin-overlay').style.display = 'flex';
    document.getElementById('admin-overlay').setAttribute('aria-hidden', 'false');
}
function closeAdminPanel() {
    document.getElementById('admin-overlay').style.display = 'none';
    document.getElementById('admin-overlay').setAttribute('aria-hidden', 'true');
}

function updateAnswerTestToggleButton() {
    const btn = document.getElementById('toggle-answer-test-btn');
    btn.textContent = testAllAnswersCorrect ? 'All Answers Correct: ON' : 'All Answers Correct: OFF';
    btn.classList.toggle('is-on', testAllAnswersCorrect);
}

// === Event bindings ===
document.getElementById('start-game-btn2').onclick = confirmChapterSelection;
document.getElementById('back-to-names-btn').onclick = closeChapterModal;
document.getElementById('reselect-chapters-btn').onclick = openChapterModal;
document.getElementById('wrong-book-btn').onclick = openWrongBook;
document.getElementById('wrong-book-clear-all').onclick = clearAllWrongBook;
document.getElementById('wrong-book-close').onclick = closeWrongBook;
document.getElementById('wrong-book-panel').addEventListener('click', (e) => e.stopPropagation());
document.getElementById('wrong-book-overlay').addEventListener('click', closeWrongBook);
document.getElementById('toggle-answer-test-btn').onclick = function () {
    testAllAnswersCorrect = !testAllAnswersCorrect;
    try { localStorage.setItem('allAnswersCorrectMode', String(testAllAnswersCorrect)); } catch (e) {}
    updateAnswerTestToggleButton();
};
updateAnswerTestToggleButton();
document.getElementById('admin-panel').addEventListener('click', (e) => e.stopPropagation());
document.getElementById('admin-overlay').addEventListener('click', closeAdminPanel);
document.getElementById('admin-close').onclick = closeAdminPanel;

document.addEventListener('keydown', function (e) {
    if (e.key !== 'Escape') return;
    const wb = document.getElementById('wrong-book-overlay');
    if (wb && wb.style.display === 'flex') { closeWrongBook(); return; }
    const ch = document.getElementById('chapter-modal');
    if (ch && ch.style.display === 'flex') { closeChapterModal(); return; }
    const overlay = document.getElementById('admin-overlay');
    if (overlay && overlay.style.display === 'flex') closeAdminPanel();
});

// === Boot ===
(function bootQuiz() {
    if (deepQuestions.length > 0) {
        startQuiz();
    }
    // Otherwise user needs to select chapters first
})();
